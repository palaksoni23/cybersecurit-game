<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Security Awareness Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
      <h1>🔐 Cyber Security Awareness Quiz</h1>
      <p>Test your cybersecurity knowledge and stay safe online!</p>

      <input type="text" id="username" placeholder="Enter your name" />

      <div class="difficulty-buttons">
        <button onclick="startQuiz('easy')">Easy</button>
        <button onclick="startQuiz('medium')">Medium</button>
        <button onclick="startQuiz('hard')">Hard</button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">

      <div class="top-bar">
        <div>⏱ Time: <span id="timer">15</span></div>
        <div>⭐ Score: <span id="score">0</span></div>
      </div>

      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>

      <h2 id="question"></h2>

      <div id="options" class="options-container"></div>

      <p id="explanation"></p>

      <button id="next-btn">Next Question</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <h1>🎉 Quiz Completed!</h1>

      <h2 id="final-score"></h2>

      <p id="message"></p>

      <div class="leaderboard">
        <h3>🏆 Leaderboard</h3>
        <ul id="leaderboard-list"></ul>
      </div>

      <button onclick="restartQuiz()">Play Again</button>
    </div>

  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
